name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r docs/requirements.txt
      - run: cargo fmt --check
      - run: cargo test
      - run: cargo clippy --all-targets -- -D warnings
      - run: scripts/check-output-contract-fixtures.sh
      - run: scripts/run-local-profiling.sh --case all --include-fastq-output --include-post-cluster --include-gff
      - run: sphinx-build -W -b html docs target/sphinx-html
      - run: scripts/release-preflight.py --expected-version 0.3.0
