name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --check
      - run: cargo test
      - run: cargo clippy --all-targets -- -D warnings
      - run: scripts/check-output-contract-fixtures.sh
      - run: scripts/run-local-profiling.sh --case all --include-fastq-output --include-post-cluster
      - run: scripts/release-preflight.py --expected-version 0.3.0
